<!DOCTYPE html>
<html>
<head>

<title>Leads</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#0b0f19;
font-family:Arial;
color:white;
margin:0;
}

.header{
padding:20px;
font-size:22px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

.add{
background:#00ff9c;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

.search{
padding:15px;
}

.search input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#111;
color:white;
}

.leads{
padding:15px;
}

.lead{
background:#111;
padding:15px;
border-radius:12px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 0 10px #00ff9c22;
}

.name{
font-size:16px;
}

.phone{
font-size:12px;
color:#aaa;
}

.tag{
padding:5px 10px;
border-radius:8px;
font-size:12px;
}

.new{background:#ff9800;}
.interested{background:#00ff9c;color:black;}
.audit{background:#03a9f4;}
.closed{background:#4caf50;}

.bottom{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:10px;
}

.bottom a{
color:white;
text-decoration:none;
font-size:14px;
}

</style>

</head>

<body>

<div class="header">

Leads

<button class="add">+ Add Lead</button>

</div>

<div class="search">

<input type="text" placeholder="Search Leads...">

</div>

<div class="leads">

<div class="lead">
<div>
<div class="name">Bhagji</div>
<div class="phone">9911513666</div>
</div>
<div class="tag new">New</div>
</div>

<div class="lead">
<div>
<div class="name">Test User</div>
<div class="phone">9999999999</div>
</div>
<div class="tag interested">Interested</div>
</div>

<div class="lead">
<div>
<div class="name">Rahul Sharma</div>
<div class="phone">8888888888</div>
</div>
<div class="tag audit">Free Audit</div>
</div>

<div class="lead">
<div>
<div class="name">Pooja Verma</div>
<div class="phone">7777777777</div>
</div>
<div class="tag closed">Sale Closed</div>
</div>

</div>

<h2>Lead Status</h2>

<div class="lead">

<div class="name">Rahul Sharma</div>
<div class="phone">9810241778</div>

<select onchange="updateLead(this.value)">

<option>Select Status</option>
<option value="interested">Interested</option>
<option value="not">Not Interested</option>
<option value="callback">Callback</option>
<option value="sale">Sale Closed</option>

</select>

</div>

<div class="bottom">

<a href="dashboard.html">Dashboard</a>
<a href="calls.html">Calls</a>
<a href="leads.html">Leads</a>
<a href="performance.html">Performance</a>
<a href="admin.html">Admin</a>

</div>

<script>

function updateLead(status){

if(status == "interested"){

let val = localStorage.getItem("interested") || 0
val++
localStorage.setItem("interested", val)

}

if(status == "sale"){

let val = localStorage.getItem("sales") || 0
val++
localStorage.setItem("sales", val)

}

alert("Lead updated")

}

</script>

</body>
</html>
