<!DOCTYPE html>
<html>
<head>
<title>PrimeGrow CRM</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#0b0f19;
font-family:Arial;
color:white;
margin:0;
}

.header{
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.header span{
color:#00ff9c;
}

.container{
padding:20px;
}

.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:#111;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 0 10px #00ff9c33;
}

.card h3{
margin:0;
font-size:16px;
}

.card p{
font-size:22px;
margin-top:10px;
color:#00ff9c;
}

.actions{
margin-top:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.btn{
padding:15px;
border-radius:10px;
border:none;
font-size:16px;
cursor:pointer;
}

.call{
background:#00ff9c;
}

.next{
background:#ff9800;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:10px;
}

.bottom a{
color:white;
text-decoration:none;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
Prime<span>Grow</span> CRM
</div>

<div class="container">

<h3>Today's Summary</h3>

<div class="cards">

<div class="card">
<h3>Total Calls</h3>
<p>128</p>
</div>

<div class="card">
<h3>Interested</h3>
<p>24</p>
</div>

<div class="card">
<h3>Free Audit</h3>
<p>5</p>
</div>

<div class="card">
<h3>Sales Closed</h3>
<p>2</p>
</div>

</div>

<div class="card" style="margin-top:15px;">
<h3>Total Earnings</h3>
<p>₹1050</p>
</div>

<div class="actions">

<button class="btn call">Start Calling</button>

<button class="btn next">Next Lead</button>

</div>

</div>

<div class="bottom">

<a href="#">Dashboard</a>
<a href="calls.html">Calls</a>
<a href="leads.html">Leads</a>
<a href="performance.html">Performance</a>
<a href="settings.html">Settings</a>

</div>

</body>
</html>
