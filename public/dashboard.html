<!DOCTYPE html>
<html>
<head>

<title>PrimeGrow CRM</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#020617;
font-family:Arial;
color:white;
margin:0;
}

.header{
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.header span{
color:#00ff9c;
}

.container{
padding:20px;
padding-bottom:120px;
}

.profile{
display:flex;
align-items:center;
margin-bottom:20px;
}

.profile img{
width:50px;
height:50px;
border-radius:50%;
margin-right:10px;
}

.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:#0f172a;
padding:22px;
border-radius:14px;
text-align:center;
box-shadow:0 0 15px #00ff9c22;
}

.card h3{
margin:0;
font-size:16px;
}

.card p{
font-size:26px;
color:#00ff9c;
margin-top:10px;
}

.earning{
background:#0f172a;
margin-top:15px;
padding:25px;
border-radius:14px;
text-align:center;
box-shadow:0 0 20px #00ff9c22;
}

.earning p{
font-size:30px;
color:#00ff9c;
}

.actions{
margin-top:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.btn{
padding:16px;
border-radius:10px;
border:none;
font-size:16px;
font-weight:bold;
}

.call{
background:#00ff9c;
}

.next{
background:#ff9800;
color:white;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
background:#020617;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #111;
}

.bottom a{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-decoration:none;
font-size:12px;
color:white;
padding:8px;
border-radius:10px;
width:60px;
}

.bottom a:nth-child(1){background:#00c3ff;}
.bottom a:nth-child(2){background:#00ff9c;}
.bottom a:nth-child(3){background:#ff9800;}
.bottom a:nth-child(4){background:#9c27ff;}
.bottom a:nth-child(5){background:#ff3d3d;}

</style>

</head>

<body>

<div class="header">
Prime<span>Grow</span> CRM
</div>

<div class="container">

<div class="profile">

<img src="https://i.pravatar.cc/100">

<div>

<div>Welcome</div>
<b>emp1</b>

</div>

</div>

<h3>Today's Summary</h3>

<div class="cards">

<div class="card">
<h3>Total Calls</h3>
<p id="totalCalls">0</p>
</div>

<div class="card">
<h3>Interested</h3>
<p id="interestedCount">0</p>
</div>

<div class="card">
<h3>Free Audit</h3>
<p>05</p>
</div>

<div class="card">
<h3>Sales Closed</h3>
<p id="salesCount">0</p>
</div>

</div>

<div class="earning" id="earningsCard">

<h3>Total Earnings</h3>

<p id="earningAmount">₹0</p>

</div>

<div class="actions">

<button class="btn call" onclick="startCalling()">Start Calling</button>
<button class="btn next" onclick="nextLead()">Next Lead</button>

</div>

</div>

<div class="bottom">

<a href="#">
<div>🏠</div>
<span>Dashboard</span>
</a>

<a href="#">
<div>📞</div>
<span>Calls</span>
</a>

<a href="#">
<div>📋</div>
<span>Leads</span>
</a>

<a href="#">
<div>📊</div>
<span>Performance</span>
</a>

<a href="#">
<div>⚙️</div>
<span>Admin</span>
</a>

</div>

<script src="js/commission.js"></script>
<script src="js/calling.js"></script>
<script src="js/leads.js"></script>

<script>

let calls = localStorage.getItem("totalCalls") || 0
document.getElementById("totalCalls").innerText = calls

let interested = localStorage.getItem("interested") || 0
document.getElementById("interestedCount").innerText = interested

let sales = localStorage.getItem("sales") || 0
document.getElementById("salesCount").innerText = sales

let user = JSON.parse(localStorage.getItem("user"))

if(user && user.role !== "admin"){
document.getElementById("earningsCard").style.display="none"
}

let earning = localStorage.getItem("earnings") || 0
document.getElementById("earningAmount").innerText = "₹" + earning

</script>

</body>
</html>
