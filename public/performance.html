<!DOCTYPE html>
<html>
<head>
<title>Employee Performance</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
width:80%;
}

th,td{
border:1px solid #444;
padding:10px;
}

th{
background:#00ff88;
color:black;
}

</style>

</head>

<body>

<h1>Employee Performance</h1>

<table id="perf">

<tr>
<th>Employee</th>
<th>Calls</th>
<th>Interested</th>
<th>Audit</th>
<th>Sales</th>
<th>Commission</th>
</tr>

</table>

<script>

fetch("/performance")
.then(res=>res.json())
.then(data=>{

let table=document.getElementById("perf")

data.forEach(e=>{

let row=`
<tr>
<td>${e.name}</td>
<td>${e.calls}</td>
<td>${e.interested}</td>
<td>${e.audit}</td>
<td>${e.sales}</td>
<td>${e.commission}</td>
</tr>
`

table.innerHTML+=row

})

})

async function load(){

let res = await fetch('/performance')
let data = await res.json()

let table = document.getElementById("perf")

data.forEach(e=>{

let row = `
<tr>
<td>${e.name}</td>
<td>${e.calls}</td>
<td>${e.interested}</td>
<td>${e.audit}</td>
<td>${e.sales}</td>
<td>₹${e.commission}</td>
</tr>
`

table.innerHTML += row

})

}

load()

</script>

<h2>Commission Calculator</h2>

<div style="background:#111;padding:20px;border-radius:10px;margin-top:20px;">

<label>Total Sales:</label>

<input id="salesInput" type="number" placeholder="Enter total sales" style="padding:10px;width:100%;margin-top:10px;">

<br><br>

<button onclick="calculateSalary()" style="
padding:10px 20px;
background:#00ff9c;
border:none;
border-radius:6px;
cursor:pointer;
">
Calculate Salary
</button>

<h3 id="salaryResult"></h3>

</div>

<script>

function calculateSalary(){

let sales = document.getElementById("salesInput").value

let baseSalary = 10000

let commission = 0

if(sales > 10){

commission = (sales - 10) * 200

}

let totalSalary = baseSalary + commission

document.getElementById("salaryResult").innerHTML =
"Total Salary: ₹" + totalSalary + " (Commission ₹" + commission + ")"

}

</script>

</body>
</html>
