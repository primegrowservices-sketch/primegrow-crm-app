<!DOCTYPE html>
<html>
<head>

<title>Employee Performance</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#0b0f19;
color:white;
font-family:Arial;
padding:20px;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
text-align:center;
}

th{
background:#111;
}

.box{
background:#111;
padding:20px;
border-radius:10px;
margin-top:30px;
}

button{
padding:10px 20px;
background:#00ff9c;
border:none;
border-radius:6px;
cursor:pointer;
}

input{
padding:8px;
width:100%;
margin-top:10px;
}

</style>

</head>

<body>

<h1>Employee Performance</h1>

<table>

<tr>
<th>Calls</th>
<th>Interested</th>
<th>Sales</th>
<th>Earnings</th>
</tr>

<tr>
<td id="calls">0</td>
<td id="interested">0</td>
<td id="sales">0</td>
<td id="earnings">₹0</td>
</tr>

</table>


<div class="box">

<h2>Commission Calculator</h2>

<label>Total Sales</label>

<input id="salesInput" type="number" placeholder="Enter sales">

<br><br>

<button onclick="calculateSalary()">

Calculate Salary

</button>

<h3 id="salaryResult"></h3>

</div>


<script>

let calls = localStorage.getItem("totalCalls") || 0
let interested = localStorage.getItem("interested") || 0
let sales = localStorage.getItem("sales") || 0
let earnings = localStorage.getItem("earnings") || 0

document.getElementById("calls").innerText = calls
document.getElementById("interested").innerText = interested
document.getElementById("sales").innerText = sales
document.getElementById("earnings").innerText = "₹" + earnings


function calculateSalary(){

let sales = document.getElementById("salesInput").value

let baseSalary = 10000

let commission = 0

if(sales > 10){

commission = (sales - 10) * 200

}

let totalSalary = baseSalary + commission

document.getElementById("salaryResult").innerHTML =
"Total Salary : ₹" + totalSalary +
" (Commission ₹" + commission + ")"

}

</script>

</body>
</html>
