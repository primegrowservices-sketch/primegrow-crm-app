<!DOCTYPE html>
<html>
<head>
<title>Employee Login</title>

<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
padding-top:120px;
}

.login-box{
background:#111;
padding:30px;
border-radius:10px;
width:260px;
margin:auto;
box-shadow:0 0 10px #000;
}

input{
padding:10px;
margin:8px;
width:90%;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#00ff88;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Employee Login</h2>

<input id="user" placeholder="Employee ID">

<input id="pass" type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value

if(user=="emp1" && pass=="1234"){

localStorage.setItem("employee",user)

window.location="/"

}else{

alert("Wrong Login")

}

}

</script>

</body>
</html>
