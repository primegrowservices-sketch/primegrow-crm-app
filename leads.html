<!DOCTYPE html>
<html>
<head>

<title>Leads</title>

<style>

body{
background:#020617;
font-family:Arial;
color:white;
margin:0;
}

.header{
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.lead-list{
padding:20px;
}

.lead{
background:#0f172a;
padding:15px;
border-radius:14px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

.lead-info{
font-size:14px;
}

.lead-actions button{
margin-left:6px;
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.call{
background:#00ff9c;
}

.whatsapp{
background:#25D366;
color:white;
}

</style>

</head>

<body>

<div class="header">
Leads
</div>

<div class="lead-list">

<div class="lead">

<div class="lead-info">
Rahul Sharma<br>
9876543210
</div>

<div class="lead-actions">

<button class="call">Call</button>

<button class="whatsapp">WhatsApp</button>

</div>

</div>

<div class="lead">

<div class="lead-info">
Amit Verma<br>
9812345678
</div>

<div class="lead-actions">

<button class="call">Call</button>

<button class="whatsapp">WhatsApp</button>

</div>

</div>

</div>

</body>

</html>
